<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0c2040"/>
    </linearGradient>
    <linearGradient id="mark" x1="12" y1="8" x2="52" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e0f2fe"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect x="1" y="1" width="62" height="62" rx="15" stroke="rgba(56,189,248,0.25)" stroke-width="1.5" fill="none"/>
  <!-- Lightning bolt / power mark -->
  <path filter="url(#glow)" d="M36 8L18 36h16l-6 20 26-30H38L36 8Z" fill="url(#mark)" opacity="0.95"/>
</svg>
